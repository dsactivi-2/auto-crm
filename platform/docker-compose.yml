services:
  # ── Next.js App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: crm-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PLAYWRIGHT_SERVICE_URL=http://playwright:3001
    restart: unless-stopped
    depends_on:
      playwright:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Playwright CRM-Automation Service ───────────────────
  playwright:
    build:
      context: ./playwright
      dockerfile: Dockerfile
    container_name: crm-playwright
    environment:
      - CRM_URL=${CRM_URL:-https://crm.job-step.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - playwright-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Activepieces Plugin-Framework ───────────────────────
  # Öffne http://localhost:8080 um Automations zu erstellen
  # Deaktiviere diesen Service wenn nicht benötigt:
  #   docker compose up app playwright
  activepieces:
    image: activepieces/activepieces:latest
    container_name: crm-activepieces
    ports:
      - "8080:80"
    depends_on:
      - ap-postgres
      - ap-redis
    environment:
      - AP_ENGINE_EXECUTABLE_PATH=dist/packages/engine/main.js
      - AP_API_KEY=${AP_API_KEY:-change-me-in-env}
      - AP_ENCRYPTION_KEY=${AP_ENCRYPTION_KEY:-a-32-char-secret-change-me-now!}
      - AP_JWT_SECRET=${AP_JWT_SECRET:-another-jwt-secret-change-me!}
      - AP_FRONTEND_URL=${AP_FRONTEND_URL:-http://localhost:8080}
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=ap-postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=activepieces
      - AP_POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD:-activepieces-db-pass}
      - AP_REDIS_URL=redis://ap-redis:6379
      - AP_TELEMETRY_ENABLED=false
      - AP_EXECUTION_MODE=UNSANDBOXED
    restart: unless-stopped
    profiles:
      - plugins
    deploy:
      resources:
        limits:
          memory: 1G

  ap-postgres:
    image: postgres:16-alpine
    container_name: crm-ap-postgres
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=activepieces
      - POSTGRES_PASSWORD=${AP_POSTGRES_PASSWORD:-activepieces-db-pass}
    volumes:
      - ap-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - plugins
    deploy:
      resources:
        limits:
          memory: 512M

  ap-redis:
    image: redis:7-alpine
    container_name: crm-ap-redis
    restart: unless-stopped
    profiles:
      - plugins
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  playwright-data:
  ap-postgres-data:
